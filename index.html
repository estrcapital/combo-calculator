<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Combo Calculator | ESTR Capital</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Custom scrollbar for history table */
      .overflow-x-auto::-webkit-scrollbar {
        height: 4px;
      }
      .overflow-x-auto::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .overflow-x-auto::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scaleIn 0.3s ease-out forwards;
      }

      /* PWA Splash Screen Fix */
      html, body {
        height: 100%;
        margin: 0;
        background-color: #0f172a;
      }
    </style>
  </head>
  <body class="bg-[#0f172a] text-[#f8fafc] selection:bg-sky-500/30 pb-24">
    <div id="app" class="min-h-screen flex flex-col items-center py-12 px-4 relative">
      
      <!-- STF View -->
      <div id="view-stf" class="w-full max-w-[700px] animate-fade-in">
        <div class="flex flex-col items-center mb-12">
          <div class="flex items-center justify-center gap-3 mb-2">
            <div class="p-3 bg-sky-500/10 rounded-2xl border border-sky-500/20 shadow-[0_0_20px_rgba(56,189,248,0.1)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-400">
                <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
              </svg>
            </div>
            <h1 class="text-[28px] font-bold tracking-tight text-[#f8fafc]">Combo <span class="text-sky-400">Calculator</span></h1>
          </div>
          <div class="text-sky-400/60 text-xl font-black tracking-[0.4em] uppercase">STF</div>
        </div>

        <div class="bg-[#1e293b] rounded-[24px] p-8 md:p-12 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border border-[#334155] backdrop-blur-sm relative overflow-hidden mb-8">
          <div class="absolute -top-24 -right-24 w-48 h-48 bg-sky-500/5 blur-3xl rounded-full"></div>
          <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-sky-500/5 blur-3xl rounded-full"></div>
          <div class="relative z-10">
            <div class="grid grid-cols-2 gap-[20px] mb-8">
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 5</label>
                <input type="number" id="stf-input-0" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-sky-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 13</label>
                <input type="number" id="stf-input-1" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-sky-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 21</label>
                <input type="number" id="stf-input-2" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-sky-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 34</label>
                <input type="number" id="stf-input-3" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-sky-400 transition-colors placeholder:text-slate-600">
              </div>
            </div>
            <div class="flex gap-3">
              <button onclick="calculate('stf')" class="flex-1 flex items-center justify-center gap-2 py-4 bg-sky-400 hover:bg-sky-300 text-[#0f172a] rounded-[12px] font-bold text-base transition-all shadow-lg shadow-sky-500/20 active:scale-[0.98]">
                <i data-lucide="calculator" class="w-5 h-5"></i>Calculate Results
              </button>
              <button onclick="resetFields('stf')" class="p-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-[12px] border border-[#334155] transition-all active:scale-[0.95]"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
            </div>
          </div>
        </div>
        <div id="stf-result-container" class="hidden mb-12 animate-scale-in">
          <div class="bg-[#0f172a] border border-[#334155] border-dashed rounded-[12px] p-6 relative group">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[12px] uppercase tracking-[0.05em] font-semibold text-[#94a3b8] mx-auto">RESULT</span>
              <button onclick="copyResult('stf')" class="absolute right-4 top-4 text-sky-400 hover:text-sky-300 transition-colors p-1"><i data-lucide="copy" class="w-4 h-4" id="stf-copy-icon"></i></button>
            </div>
            <div id="stf-result-display" class="text-2xl font-bold tracking-[0.05em] text-sky-400 text-center"></div>
          </div>
        </div>
      </div>

      <!-- LTF View -->
      <div id="view-ltf" class="w-full max-w-[700px] animate-fade-in hidden">
        <div class="flex flex-col items-center mb-12">
          <div class="flex items-center justify-center gap-3 mb-2">
            <div class="p-3 bg-emerald-500/10 rounded-2xl border border-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.1)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400">
                <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
              </svg>
            </div>
            <h1 class="text-[28px] font-bold tracking-tight text-[#f8fafc]">Combo <span class="text-emerald-400">Calculator</span></h1>
          </div>
          <div class="text-emerald-400/60 text-xl font-black tracking-[0.4em] uppercase">LTF</div>
        </div>

        <div class="bg-[#1e293b] rounded-[24px] p-8 md:p-12 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border border-[#334155] backdrop-blur-sm relative overflow-hidden mb-8">
          <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full"></div>
          <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full"></div>
          <div class="relative z-10">
            <div class="grid grid-cols-2 gap-[20px] mb-8">
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 5</label>
                <input type="number" id="ltf-input-0" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 13</label>
                <input type="number" id="ltf-input-1" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 21</label>
                <input type="number" id="ltf-input-2" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 34</label>
                <input type="number" id="ltf-input-3" placeholder="0" class="w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
            </div>
            <div class="flex gap-3">
              <button onclick="calculate('ltf')" class="flex-1 flex items-center justify-center gap-2 py-4 bg-emerald-400 hover:bg-emerald-300 text-[#0f172a] rounded-[12px] font-bold text-base transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                <i data-lucide="calculator" class="w-5 h-5"></i>Calculate Results
              </button>
              <button onclick="resetFields('ltf')" class="p-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-[12px] border border-[#334155] transition-all active:scale-[0.95]"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
            </div>
          </div>
        </div>
        <div id="ltf-result-container" class="hidden mb-12 animate-scale-in">
          <div class="bg-[#0f172a] border border-[#334155] border-dashed rounded-[12px] p-6 relative group">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[12px] uppercase tracking-[0.05em] font-semibold text-[#94a3b8] mx-auto">RESULT</span>
              <button onclick="copyResult('ltf')" class="absolute right-4 top-4 text-emerald-400 hover:text-emerald-300 transition-colors p-1"><i data-lucide="copy" class="w-4 h-4" id="ltf-copy-icon"></i></button>
            </div>
            <div id="ltf-result-display" class="text-2xl font-bold tracking-[0.05em] text-emerald-400 text-center"></div>
          </div>
        </div>
      </div>

      <!-- Combo View -->
      <div id="view-combo" class="w-full max-w-[700px] animate-fade-in hidden">
        <div class="flex flex-col items-center mb-12">
          <div class="flex items-center justify-center gap-3 mb-2">
            <div class="p-3 bg-white/10 rounded-2xl border border-white/20 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
              </svg>
            </div>
            <h1 class="text-[28px] font-bold tracking-tight text-[#f8fafc]">Combo <span class="text-white/60">Number</span></h1>
          </div>
        </div>

        <div class="grid gap-6">
          <!-- Combo Number Display -->
          <div class="bg-white/5 rounded-[24px] p-8 border border-white/10 relative overflow-hidden text-center mb-4">
            <div class="text-white/40 text-[12px] uppercase tracking-[0.2em] font-bold mb-2">Detected Combo</div>
            <div id="combo-number-display" class="text-6xl font-black text-white tracking-tighter">--</div>
          </div>

          <!-- LTF Summary -->
          <div class="bg-[#1e293b] rounded-[24px] p-8 border border-[#334155] relative overflow-hidden">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-emerald-400 font-bold uppercase tracking-widest text-sm">LTF Result</h3>
              <button onclick="copyResult('ltf')" class="text-emerald-400/50 hover:text-emerald-400 transition-colors"><i data-lucide="copy" class="w-4 h-4" id="combo-ltf-copy-icon"></i></button>
            </div>
            <div id="combo-ltf-display" class="text-3xl font-bold text-emerald-400 tracking-wider">No Data</div>
          </div>

          <!-- STF Summary -->
          <div class="bg-[#1e293b] rounded-[24px] p-8 border border-[#334155] relative overflow-hidden">
            <div class="flex items-center justify-between mb-4">
              <h3 class="text-sky-400 font-bold uppercase tracking-widest text-sm">STF Result</h3>
              <button onclick="copyResult('stf')" class="text-sky-400/50 hover:text-sky-400 transition-colors"><i data-lucide="copy" class="w-4 h-4" id="combo-stf-copy-icon"></i></button>
            </div>
            <div id="combo-stf-display" class="text-3xl font-bold text-sky-400 tracking-wider">No Data</div>
          </div>
        </div>
      </div>

      <!-- Footer Info -->
      <div class="mt-16 text-center">
        <p class="text-slate-600 text-[11px] uppercase tracking-widest font-bold">By "ESTR Capital"</p>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#1e293b]/80 backdrop-blur-xl border-t border-[#334155] z-[100] px-6 pb-safe">
      <div class="max-w-[700px] mx-auto flex justify-between items-center h-20">
        <button onclick="switchView('stf')" id="nav-stf" class="flex flex-col items-center gap-1 flex-1 text-sky-400 transition-all">
          <i data-lucide="zap" class="w-6 h-6"></i>
          <span class="text-[10px] font-bold uppercase tracking-tighter">STF</span>
        </button>
        <button onclick="switchView('ltf')" id="nav-ltf" class="flex flex-col items-center gap-1 flex-1 text-slate-500 hover:text-emerald-400 transition-all">
          <i data-lucide="trending-up" class="w-6 h-6"></i>
          <span class="text-[10px] font-bold uppercase tracking-tighter">LTF</span>
        </button>
        <button onclick="switchView('combo')" id="nav-combo" class="flex flex-col items-center gap-1 flex-1 text-slate-500 hover:text-white transition-all">
          <i data-lucide="box" class="w-6 h-6"></i>
          <span class="text-[10px] font-bold uppercase tracking-tighter">Combo</span>
        </button>
      </div>
    </nav>

    <script>
      lucide.createIcons();

      const FIB_VALUES = [5, 13, 21, 34];
      const VIEWS = ['stf', 'ltf', 'combo'];
      
      // State
      let currentView = 'stf';

      function switchView(view) {
        currentView = view;
        VIEWS.forEach(v => {
          document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
          const navBtn = document.getElementById(`nav-${v}`);
          
          // Reset nav styles
          navBtn.classList.remove('text-sky-400', 'text-emerald-400', 'text-white');
          navBtn.classList.add('text-slate-500');
          
          if (v === view) {
            navBtn.classList.remove('text-slate-500');
            if (v === 'stf') navBtn.classList.add('text-sky-400');
            if (v === 'ltf') navBtn.classList.add('text-emerald-400');
            if (v === 'combo') navBtn.classList.add('text-white');
          }
        });

        if (view === 'combo') updateComboView();
        window.scrollTo(0, 0);
      }

      function calculate(type) {
        const inputs = [0, 1, 2, 3].map(i => document.getElementById(`${type}-input-${i}`));
        const values = inputs.map(el => parseFloat(el.value));
        
        if (values.some(isNaN)) {
          alert('Please enter valid numbers in all fields.');
          return;
        }

        const indexed = values.map((val, idx) => ({ val, fib: FIB_VALUES[idx] }));
        const sorted = [...indexed].sort((a, b) => b.val - a.val);
        const resultSequence = sorted.map(item => item.fib);
        const resultStr = resultSequence.join(', ');
        
        const display = document.getElementById(`${type}-result-display`);
        const container = document.getElementById(`${type}-result-container`);
        
        display.textContent = resultStr;
        container.classList.remove('hidden');
        localStorage.setItem(`combo_calc_last_result_${type}`, resultStr);
      }

      function resetFields(type) {
        [0, 1, 2, 3].forEach(i => document.getElementById(`${type}-input-${i}`).value = '');
        document.getElementById(`${type}-result-container`).classList.add('hidden');
        localStorage.removeItem(`combo_calc_last_result_${type}`);
      }

      let combosData = null;

      async function loadCombosData() {
        try {
          const response = await fetch('combos_576.json');
          if (response.ok) {
            combosData = await response.json();
            updateComboView();
          }
        } catch (error) {
          console.error('Error loading combos data:', error);
        }
      }

      function updateComboView() {
        const stf = localStorage.getItem('combo_calc_last_result_stf') || 'No Data';
        const ltf = localStorage.getItem('combo_calc_last_result_ltf') || 'No Data';
        
        document.getElementById('combo-stf-display').textContent = stf;
        document.getElementById('combo-ltf-display').textContent = ltf;

        const comboDisplay = document.getElementById('combo-number-display');
        if (!comboDisplay) return;

        if (stf !== 'No Data' && ltf !== 'No Data' && combosData) {
          const stfArray = stf.split(', ').map(Number);
          const ltfArray = ltf.split(', ').map(Number);

          const match = combosData.find(c => {
            const stfMatch = JSON.stringify(c.stf) === JSON.stringify(stfArray);
            const ltfMatch = JSON.stringify(c.ltf) === JSON.stringify(ltfArray);
            return stfMatch && ltfMatch;
          });

          if (match) {
            comboDisplay.textContent = match.combo;
            comboDisplay.classList.remove('opacity-20');
          } else {
            comboDisplay.textContent = 'N/A';
            comboDisplay.classList.add('opacity-20');
          }
        } else {
          comboDisplay.textContent = '--';
          comboDisplay.classList.add('opacity-20');
        }
      }

      function copyResult(type) {
        const text = localStorage.getItem(`combo_calc_last_result_${type}`);
        if (text) {
          navigator.clipboard.writeText(text);
          
          // Update icons in both the main view and combo view if they exist
          const icons = [
            document.getElementById(`${type}-copy-icon`),
            document.getElementById(`combo-${type}-copy-icon`)
          ].filter(icon => icon !== null);

          icons.forEach(icon => {
            icon.setAttribute('data-lucide', 'check');
          });
          
          lucide.createIcons();
          
          setTimeout(() => {
            icons.forEach(icon => {
              icon.setAttribute('data-lucide', 'copy');
            });
            lucide.createIcons();
          }, 2000);
        }
      }

      // Enter Key Navigation
      ['stf', 'ltf'].forEach(type => {
        [0, 1, 2, 3].forEach(idx => {
          const el = document.getElementById(`${type}-input-${idx}`);
          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              if (idx < 3) {
                document.getElementById(`${type}-input-${idx + 1}`).focus();
              } else {
                calculate(type);
              }
            }
          });
        });
      });

      // Initial Load
      loadCombosData();
      ['stf', 'ltf'].forEach(type => {
        const last = localStorage.getItem(`combo_calc_last_result_${type}`);
        if (last) {
          document.getElementById(`${type}-result-display`).textContent = last;
          document.getElementById(`${type}-result-container`).classList.remove('hidden');
        }
      });
    </script>
  </body>
</html>
