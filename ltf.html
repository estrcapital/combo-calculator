<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Combo Calculator LTF | ESTR Capital</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Custom scrollbar for history table */
      .overflow-x-auto::-webkit-scrollbar {
        height: 4px;
      }
      .overflow-x-auto::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .overflow-x-auto::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scaleIn 0.3s ease-out forwards;
      }

      /* PWA Splash Screen Fix */
      html, body {
        height: 100%;
        margin: 0;
        background-color: #0f172a;
      }
    </style>
  </head>
  <body class="bg-[#0f172a] text-[#f8fafc] selection:bg-emerald-500/30">
    <div id="app" class="min-h-screen flex flex-col items-center py-12 px-4 relative">
      <!-- Switch Button -->
      <div class="absolute top-6 right-6 z-50">
        <a href="index.html" class="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full border border-[#334155] transition-all text-xs font-bold uppercase tracking-widest active:scale-95">
          <i data-lucide="layers" class="w-4 h-4"></i>
          Switch to STF
        </a>
      </div>

      <div class="w-full max-w-[700px] animate-fade-in">
        
        <!-- Header -->
        <div class="flex flex-col items-center mb-12">
          <div class="flex items-center justify-center gap-3 mb-2">
            <div class="p-3 bg-emerald-500/10 rounded-2xl border border-emerald-500/20 shadow-[0_0_20px_rgba(16,185,129,0.1)]">
              <!-- Stock Market Logo SVG -->
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400">
                <path d="M3 3v18h18"/>
                <path d="m19 9-5 5-4-4-3 3"/>
              </svg>
            </div>
            <h1 class="text-[28px] font-bold tracking-tight text-[#f8fafc]">
              Combo <span class="text-emerald-400">Calculator</span>
            </h1>
          </div>
          <div class="text-emerald-400/60 text-xl font-black tracking-[0.4em] uppercase">LTF</div>
        </div>

        <!-- Main Card -->
        <div class="bg-[#1e293b] rounded-[24px] p-8 md:p-12 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border border-[#334155] backdrop-blur-sm relative overflow-hidden mb-8">
          <div class="absolute -top-24 -right-24 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full"></div>
          <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-emerald-500/5 blur-3xl rounded-full"></div>

          <div class="relative z-10">
            <div class="grid grid-cols-2 gap-[20px] mb-8">
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 5</label>
                <input type="number" id="input-0" placeholder="0" class="input-field w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 13</label>
                <input type="number" id="input-1" placeholder="0" class="input-field w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 21</label>
                <input type="number" id="input-2" placeholder="0" class="input-field w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
              <div class="space-y-2">
                <label class="text-[12px] uppercase tracking-widest font-semibold text-[#94a3b8] ml-1">EMA 34</label>
                <input type="number" id="input-3" placeholder="0" class="input-field w-full bg-[#0f172a] border border-[#334155] text-white px-4 py-[14px] rounded-[12px] font-sans text-base focus:outline-none focus:border-emerald-400 transition-colors placeholder:text-slate-600">
              </div>
            </div>

            <div class="flex gap-3">
              <button id="calculate-btn" class="flex-1 flex items-center justify-center gap-2 py-4 bg-emerald-400 hover:bg-emerald-300 text-[#0f172a] rounded-[12px] font-bold text-base transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                <i data-lucide="calculator" class="w-5 h-5"></i>
                Calculate Results
              </button>

              <button id="reset-fields-btn" class="p-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-[12px] border border-[#334155] transition-all active:scale-[0.95]" title="Clear Fields">
                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Current Result Area -->
        <div id="result-container" class="hidden mb-12 animate-scale-in">
          <div class="bg-[#0f172a] border border-[#334155] border-dashed rounded-[12px] p-6 relative group">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[12px] uppercase tracking-[0.05em] font-semibold text-[#94a3b8] mx-auto">RESULT</span>
              <button id="copy-result-btn" class="absolute right-4 top-4 text-emerald-400 hover:text-emerald-300 transition-colors p-1">
                <i data-lucide="copy" class="w-4 h-4" id="copy-icon"></i>
              </button>
            </div>
            <div id="result-display" class="text-2xl font-bold tracking-[0.05em] text-emerald-400 text-center"></div>
          </div>
        </div>

        <!-- History Table -->
        <div id="history-container" class="hidden animate-fade-in">
          <div class="w-full overflow-hidden rounded-2xl border border-[#334155] bg-[#1e293b]/50 backdrop-blur-sm">
            <div class="p-4 border-b border-[#334155] bg-[#1e293b] flex justify-between items-center">
              <h2 class="text-sm font-bold uppercase tracking-widest text-[#94a3b8]">Calculation History</h2>
              <span id="history-count" class="text-[10px] text-slate-500">0 Records</span>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-[#0f172a]/50 text-[11px] uppercase tracking-wider text-[#94a3b8] font-bold">
                    <th class="px-4 py-3 border-b border-[#334155]">EMA Inputs</th>
                    <th class="px-4 py-3 border-b border-[#334155]">Result Sequence</th>
                    <th class="px-4 py-3 border-b border-[#334155] text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="history-body" class="text-sm">
                  <!-- History rows injected here -->
                </tbody>
              </table>
            </div>
            <div class="p-4 bg-[#1e293b]/30 border-t border-[#334155] flex justify-center">
              <button id="clear-history-btn" class="flex items-center gap-2 px-4 py-2 text-xs font-bold uppercase tracking-widest text-slate-500 hover:text-red-400 transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                Clear All History
              </button>
            </div>
          </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-16 text-center">
          <p class="text-slate-600 text-[11px] uppercase tracking-widest font-bold">
            By "ESTR Capital"
          </p>
        </div>
      </div>
    </div>

    <script>
      // Initialize Lucide Icons
      lucide.createIcons();

      // State Management
      let history = [];
      const FIB_VALUES = [5, 13, 21, 34];
      const STORAGE_KEY = 'combo_calc_history_ltf';
      const RESULT_KEY = 'combo_calc_last_result_ltf';

      // DOM Elements
      const inputElements = [
        document.getElementById('input-0'),
        document.getElementById('input-1'),
        document.getElementById('input-2'),
        document.getElementById('input-3')
      ];
      const calculateBtn = document.getElementById('calculate-btn');
      const resetFieldsBtn = document.getElementById('reset-fields-btn');
      const clearHistoryBtn = document.getElementById('clear-history-btn');
      const resultContainer = document.getElementById('result-container');
      const resultDisplay = document.getElementById('result-display');
      const historyContainer = document.getElementById('history-container');
      const historyBody = document.getElementById('history-body');
      const historyCount = document.getElementById('history-count');
      const copyResultBtn = document.getElementById('copy-result-btn');

      // Load History
      function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            history = JSON.parse(saved);
            renderHistory();
          } catch (e) {
            console.error('Failed to load history', e);
          }
        }

        const lastResult = localStorage.getItem(RESULT_KEY);
        if (lastResult) {
          resultDisplay.textContent = lastResult;
          resultContainer.classList.remove('hidden');
        }
      }

      // Save History
      function saveHistory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        renderHistory();
      }

      // Render History Table
      function renderHistory() {
        if (history.length === 0) {
          historyContainer.classList.add('hidden');
          return;
        }
        
        historyContainer.classList.remove('hidden');
        historyCount.textContent = `${history.length} Records`;
        
        historyBody.innerHTML = history.map(item => `
          <tr class="group hover:bg-emerald-500/5 transition-colors border-b border-[#334155]/50 last:border-0">
            <td class="px-4 py-4 font-mono text-xs text-slate-400">
              ${item.inputs.join(' | ')}
            </td>
            <td class="px-4 py-4 font-bold text-emerald-400 tracking-wide">
              ${item.result.join(', ')}
            </td>
            <td class="px-4 py-4 text-right">
              <div class="flex justify-end gap-2">
                <button onclick="copyText('${item.result.join(', ')}')" class="p-2 text-slate-500 hover:text-emerald-400 transition-colors" title="Copy Result">
                  <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
                <button onclick="deleteRow('${item.id}')" class="p-2 text-slate-500 hover:text-red-400 transition-colors" title="Delete Row">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
            </td>
          </tr>
        `).join('');
        
        lucide.createIcons();
      }

      // Calculation Logic
      function calculate() {
        const values = inputElements.map(el => parseFloat(el.value));
        
        if (values.some(isNaN)) {
          alert('Please enter valid numbers in all fields.');
          return;
        }

        // Map inputs to their respective EMA values
        const indexed = values.map((val, idx) => ({ val, fib: FIB_VALUES[idx] }));
        
        // Sort by input value descending
        const sorted = [...indexed].sort((a, b) => b.val - a.val);
        
        // Extract the EMA values in the new sorted order
        const resultSequence = sorted.map(item => item.fib);
        const resultStr = resultSequence.join(', ');
        
        resultDisplay.textContent = resultStr;
        resultContainer.classList.remove('hidden');
        localStorage.setItem(RESULT_KEY, resultStr);

        // Add to history
        const newItem = {
          id: Math.random().toString(36).substr(2, 9),
          inputs: values.map(v => v.toString()),
          result: resultSequence,
          timestamp: Date.now()
        };
        
        history.unshift(newItem);
        saveHistory();
      }

      // Actions
      function deleteRow(id) {
        history = history.filter(item => item.id !== id);
        saveHistory();
      }

      function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
          // Visual feedback could be added here
        });
      }

      // Event Listeners
      calculateBtn.addEventListener('click', calculate);
      
      resetFieldsBtn.addEventListener('click', () => {
        inputElements.forEach(el => el.value = '');
        resultContainer.classList.add('hidden');
        localStorage.removeItem(RESULT_KEY);
      });

      clearHistoryBtn.addEventListener('click', () => {
        if (confirm('Are you sure you want to clear all history?')) {
          history = [];
          saveHistory();
        }
      });

      copyResultBtn.addEventListener('click', () => {
        copyText(resultDisplay.textContent);
        const icon = document.getElementById('copy-icon');
        icon.setAttribute('data-lucide', 'check');
        lucide.createIcons();
        setTimeout(() => {
          icon.setAttribute('data-lucide', 'copy');
          lucide.createIcons();
        }, 2000);
      });

      // Enter Key Navigation
      inputElements.forEach((el, idx) => {
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            if (idx < 3) {
              inputElements[idx + 1].focus();
            } else {
              calculate();
            }
          }
        });
      });

      // Initialize
      loadHistory();
    </script>
  </body>
</html>
